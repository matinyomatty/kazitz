<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kazi TZ | Executive & NGO Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1A7A4A; --bg: #F8FAFC; --card: #FFFFFF; --text: #1E293B; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); }
        
        .navbar { background: #fff; padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #E2E8F0; position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: 800; font-size: 1.6rem; color: var(--primary); letter-spacing: -1px; }
        .logo span { color: #000; }

        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        .hero { text-align: center; margin-bottom: 2.5rem; }
        .hero h1 { font-size: 2.2rem; margin-bottom: 0.5rem; }

        /* Modern Sector Grid */
        .sector-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 2rem; }
        .sector-btn { padding: 12px; border-radius: 12px; border: 1px solid #E2E8F0; background: #fff; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .sector-btn:hover { border-color: var(--primary); background: #F0FDF4; transform: translateY(-2px); }

        .search-card { background: #fff; border-radius: 20px; padding: 1.5rem; border: 1px solid #E2E8F0; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .search-flex { display: flex; gap: 8px; margin-bottom: 1rem; }
        .input { flex: 1; padding: 12px 16px; border-radius: 12px; border: 2.5px solid #F1F5F9; font-size: 1rem; }
        .input:focus { border-color: var(--primary); outline: none; }
        .btn-search { background: var(--primary); color: #fff; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 700; cursor: pointer; }

        #status { display: none; text-align: center; margin: 1.5rem 0; padding: 1rem; border-radius: 12px; background: #fff; border: 1px solid #E2E8F0; }
        .spinner { width: 20px; height: 20px; border: 2.5px solid #F1F5F9; border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; margin-right: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .job-card { background: #fff; padding: 1.5rem; border-radius: 18px; margin-bottom: 1rem; border: 1px solid #E2E8F0; transition: 0.2s; }
        .job-card:hover { border-color: var(--primary); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .job-title { font-weight: 700; font-size: 1.15rem; color: #0F172A; margin-bottom: 4px; }
        .job-org { color: var(--primary); font-weight: 600; font-size: 0.9rem; margin-bottom: 10px; }
        .apply-btn { text-decoration: none; font-weight: 700; color: var(--primary); font-size: 0.85rem; border: 1.5px solid var(--primary); padding: 6px 14px; border-radius: 8px; display: inline-block; margin-top: 10px; }
        .apply-btn:hover { background: var(--primary); color: #fff; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo">Kazi<span>TZ</span></div>
    <button onclick="location.reload()" style="background:none; border:none; color:var(--text-light); font-weight:600; font-size:0.8rem; cursor:pointer;">RECOVERY MODE</button>
</nav>

<div class="container">
    <div class="hero">
        <h1>Live Executive Jobs</h1>
        <p style="color: #64748B;">AI search optimized for UN, NGO, and Healthcare roles in Tanzania.</p>
    </div>

    <div class="sector-grid">
        <button class="sector-btn" onclick="quickSearch('UN Agencies and International Organizations')">🇺🇳 UN Jobs</button>
        <button class="sector-btn" onclick="quickSearch('Health and Hospital Management')">🏥 Health</button>
        <button class="sector-btn" onclick="quickSearch('NGO and Non-Profit')">🌍 NGO</button>
        <button class="sector-btn" onclick="quickSearch('Finance and Banking')">💰 Finance</button>
    </div>

    <div class="search-card">
        <div class="search-flex">
            <input type="text" id="role" class="input" placeholder="Role, e.g. 'Project Manager'">
            <button class="btn-search" onclick="customSearch()">Search</button>
        </div>
    </div>

    <div id="status">
        <div class="spinner"></div>
        <span id="msg">Scanning active job boards...</span>
    </div>

    <div id="results" style="margin-top: 2rem;"></div>
</div>

<script>
    const API = 'AIzaSyD-aFM-A8m6lw7eNSvHOheES-p0WhzrQ38';

    async function quickSearch(cat) {
        setLoading(`Searching latest ${cat} vacancies...`);
        await run(`Find 8 active job vacancies in Tanzania for: ${cat}. Primary sources: Impactpool, ReliefWeb, and Government portals. Ignore BrighterMonday.`);
    }

    async function customSearch() {
        const r = document.getElementById('role').value;
        if(!r) return;
        setLoading(`Hunting for ${r} roles...`);
        await run(`Search 10 active vacancies in Tanzania for "${r}". Ensure URLs are current for 2026. Focus on professional/NGO sites.`);
    }

    function setLoading(m) {
        document.getElementById('status').style.display = 'block';
        document.getElementById('msg').innerText = m;
        document.getElementById('results').innerHTML = '';
    }

    async function run(prompt) {
        try {
            const controller = new AbortController();
            const tid = setTimeout(() => controller.abort(), 40000); // 40s hard limit

            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt + " Output ONLY a JSON array of objects: [{title, company, location, summary, url}]." }] }],
                    tools: [{ googleSearch: {} }]
                }),
                signal: controller.signal
            });

            clearTimeout(tid);
            const data = await res.json();
            const jobs = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, ''));

            document.getElementById('results').innerHTML = jobs.map(j => `
                <div class="job-card">
                    <div class="job-title">${j.title}</div>
                    <div class="job-org">${j.company} • ${j.location}</div>
                    <p style="font-size: 0.85rem; color: #475569; line-height: 1.5;">${j.summary}</p>
                    <a href="${j.url}" target="_blank" class="apply-btn">View Opportunity →</a>
                </div>
            `).join('');
        } catch (e) {
            document.getElementById('results').innerHTML = `
                <div style="text-align:center; padding:2rem; background:#FFF1F2; border-radius:15px; color:#9F1239; border:1px solid #FECDD3;">
                    <strong>Session Timeout</strong><br>The job server is busy. Tap "RECOVERY MODE" at the top to reset.
                </div>`;
        } finally {
            document.getElementById('status').style.display = 'none';
        }
    }
</script>
</body>
</html>
