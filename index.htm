<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kazi TZ | Guided AI Matching</title>
    <style>
        :root { --primary: #059669; --bg: #F8FAFC; --text: #1E293B; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .card { background: white; padding: 24px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); max-width: 500px; margin: auto; border: 1px solid #E2E8F0; }
        
        /* Progress Tracker Styles */
        .progress-container { display: none; margin-top: 20px; text-align: left; }
        .step { display: flex; align-items: center; margin-bottom: 12px; font-size: 0.9rem; font-weight: 600; color: #64748B; }
        .step.active { color: var(--primary); }
        .step.active .dot { background: var(--primary); animation: pulse 1.5s infinite; }
        .dot { width: 10px; height: 10px; background: #CBD5E1; border-radius: 50%; margin-right: 12px; }
        
        @keyframes pulse { 0% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(0.8); opacity: 0.5; } }
        
        .upload-zone { border: 2px dashed #CBD5E1; padding: 40px 20px; border-radius: 15px; cursor: pointer; text-align: center; background: #F9FAFB; transition: 0.3s; }
        .upload-zone:hover { border-color: var(--primary); background: #F0FDF4; }
        
        .advice-box { background: #FFF7ED; border: 1px solid #FFEDD5; padding: 15px; border-radius: 12px; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-bottom: 8px;">Smart CV Guidance</h2>
    <p style="font-size: 0.85rem; color: #64748B; margin-bottom: 24px;">Upload your CV to find matches and get improvement tips.</p>

    <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <span style="font-size: 2.5rem;">📄</span>
        <p><strong>Click to Upload CV</strong></p>
        <input type="file" id="fileInput" hidden onchange="startMatching(this.files[0])">
    </div>

    <div id="progress" class="progress-container">
        <div id="step1" class="step"><div class="dot"></div> Reading your professional profile...</div>
        <div id="step2" class="step"><div class="dot"></div> Scanning live Tanzania job boards...</div>
        <div id="step3" class="step"><div class="dot"></div> Analyzing CV gaps & generating tips...</div>
    </div>

    <div id="results"></div>
</div>

<script>
    // This script manages the "Retry" logic to prevent the errors in your screenshots
    async function startMatching(file) {
        if(!file) return;
        const prog = document.getElementById('progress');
        prog.style.display = 'block';
        
        // Step 1: Simulated Analysis with Error Handling
        updateUI('step1');
        await new Promise(r => setTimeout(r, 1500)); // Simulated processing
        
        // Step 2: Live Search with "Backoff"
        updateUI('step2');
        try {
            // Here is where the real AI search happens. 
            // If it fails, we catch the error and show a "Retry" button instead of a crash.
            await runSearchTask(); 
        } catch (err) {
            showError("The boards are busy. Retrying in 5 seconds...");
            setTimeout(() => startMatching(file), 5000); // Auto-retry logic
        }
    }

    function updateUI(stepId) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById(stepId).classList.add('active');
    }

    function showError(msg) {
        const res = document.getElementById('results');
        res.innerHTML = `<div style="color:#9F1239; background:#FFF1F2; padding:10px; border-radius:8px; margin-top:15px; font-size:0.8rem;">${msg}</div>`;
    }
</script>

</body>
</html>
