<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Kazi TZ — Executive Job Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --brand: #1A7A4A;
            --brand-dark: #125232;
            --brand-light: #E9F5EF;
            --bg: #F9FAFB;
            --surface: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border: #E5E7EB;
            --radius: 16px;
            --shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); line-height: 1.5; }

        .nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--text-main); text-decoration: none; }
        .logo span { color: var(--brand); font-style: italic; }

        .container { max-width: 1000px; margin: 3rem auto; padding: 0 1.5rem; }

        .header-section { text-align: center; margin-bottom: 3rem; }
        .header-section h1 { font-family: 'Playfair Display', serif; font-size: 36px; margin-bottom: 0.5rem; }
        .header-section p { color: var(--text-muted); font-size: 16px; }

        /* The Two-Option Grid */
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 3rem; }
        @media (max-width: 768px) { .options-grid { grid-template-columns: 1fr; } }

        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; box-shadow: var(--shadow); transition: transform 0.2s; position: relative; overflow: hidden; }
        .card:hover { transform: translateY(-4px); border-color: var(--brand); }
        .card h2 { font-size: 18px; margin-bottom: 1rem; display: flex; align-items: center; gap: 10px; }
        
        /* Option A: Search Input */
        .search-group { display: flex; flex-direction: column; gap: 12px; }
        .input-field { width: 100%; padding: 14px 18px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 15px; font-family: inherit; transition: 0.2s; }
        .input-field:focus { outline: none; border-color: var(--brand); ring: 2px solid var(--brand-light); }
        .btn-primary { background: var(--brand); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-primary:hover { background: var(--brand-dark); }

        /* Option B: CV Upload */
        .upload-zone { border: 2px dashed var(--border); border-radius: 12px; padding: 2rem; text-align: center; cursor: pointer; transition: 0.2s; background: var(--bg); }
        .upload-zone:hover { border-color: var(--brand); background: var(--brand-light); }
        .upload-zone p { font-size: 14px; color: var(--text-muted); margin-top: 8px; }

        /* Status & Results */
        .status-area { display: none; text-align: center; padding: 2rem; }
        .loader { width: 30px; height: 30px; border: 3px solid var(--brand-light); border-top-color: var(--brand); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .results-grid { display: grid; gap: 1.5rem; }
        .job-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; transition: 0.2s; }
        .job-card:hover { box-shadow: var(--shadow); }
        .job-card h3 { font-size: 18px; margin-bottom: 4px; }
        .job-card .meta { font-size: 14px; color: var(--brand); font-weight: 600; margin-bottom: 12px; }
        .job-card .desc { font-size: 14px; color: var(--text-muted); margin-bottom: 16px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .apply-link { text-decoration: none; color: var(--brand); font-weight: 700; font-size: 14px; display: inline-flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>

<nav class="nav">
    <a href="#" class="logo">Kazi <span>TZ</span></a>
    <div style="font-size: 12px; font-weight: 600; color: var(--text-muted);">LIVE SCANNER 🇹🇿</div>
</nav>

<main class="container">
    <div class="header-section">
        <h1>Find Your Next Move</h1>
        <p>Real-time opportunities from Tanzania's top employers</p>
    </div>

    <div class="options-grid">
        <div class="card">
            <h2><span>🔍</span> Search by Role</h2>
            <div class="search-group">
                <input type="text" id="roleInput" class="input-field" placeholder="e.g. Project Manager, Accountant..."/>
                <button class="btn-primary" onclick="searchByRole()">Scan Job Boards</button>
            </div>
        </div>

        <div class="card">
            <h2><span>📄</span> Match My CV</h2>
            <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
                <strong>Upload Resume</strong>
                <p>PDF or Word (max 5MB)</p>
                <input type="file" id="fileInput" hidden accept=".pdf,.doc,.docx,.txt" onchange="searchByFile(this.files[0])"/>
            </div>
        </div>
    </div>

    <div class="status-area" id="statusArea">
        <div class="loader"></div>
        <p id="statusMsg" style="font-weight: 600;">Consulting AI Intelligence...</p>
    </div>

    <div id="resultsArea" class="results-grid"></div>
</main>

<script>
    const API_KEY = 'AIzaSyD-aFM-A8m6lw7eNSvHOheES-p0WhzrQ38';

    async function searchByRole() {
        const query = document.getElementById('roleInput').value;
        if (!query) return;
        await runQuery(`Find 8 active job vacancies in Tanzania for "${query}".`);
    }

    async function searchByFile(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async () => {
            const base64 = reader.result.split(',')[1];
            await runQuery("Identify the candidate's profession from this CV and find 8 matching open jobs in Tanzania.", base64, file.type);
        };
        reader.readAsDataURL(file);
    }

    async function runQuery(promptText, base64 = null, mime = null) {
        const status = document.getElementById('statusArea');
        const results = document.getElementById('resultsArea');
        status.style.display = 'block';
        results.innerHTML = '';

        const payload = {
            contents: [{
                parts: [
                    { text: promptText + " Return ONLY a JSON array of objects with keys: title, company, location, summary, url. Be specific to Tanzania." },
                    base64 ? { inline_data: { mime_type: mime, data: base64 } } : null
                ].filter(Boolean)
            }],
            tools: [{ googleSearch: {} }],
            generationConfig: { response_mime_type: "application/json", temperature: 0.1 }
        };

        try {
            const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await resp.json();
            const jobs = JSON.parse(data.candidates[0].content.parts[0].text);
            
            results.innerHTML = jobs.map(j => `
                <div class="job-card">
                    <h3>${j.title}</h3>
                    <div class="meta">${j.company} • ${j.location}</div>
                    <p class="desc">${j.summary}</p>
                    <a href="${j.url}" target="_blank" class="apply-link">Apply on Source →</a>
                </div>
            `).join('');
        } catch (e) {
            results.innerHTML = `<p style="text-align:center; color:red;">Connection timed out. Please try again.</p>`;
        } finally {
            status.style.display = 'none';
        }
    }
</script>
</body>
</html>
