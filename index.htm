<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Kazi TZ — Professional AI Job Search</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --ink: #0D1117; --ink2: #3D4451; --ink3: #7A8190;
            --paper: #F8F6F1; --paper2: #EEEAE0; --paper3: #E2DDD3;
            --green: #1A7A4A; --green-light: #D6EDE2; --green-mid: #A8D4BB;
            --surface: #FFFFFF;
            --r-lg: 18px; --r-xl: 28px;
            --shadow-lg: 0 8px 32px rgba(13,17,23,0.12);
            --font-display: 'Playfair Display', Georgia, serif;
            --font-body: 'Outfit', system-ui, sans-serif;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-body); background: var(--paper); color: var(--ink); min-height: 100vh; line-height: 1.6; }
        
        .header { background: var(--surface); border-bottom: 1px solid var(--paper3); position: sticky; top: 0; z-index: 100; }
        .header-inner { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; display: flex; align-items: center; height: 62px; }
        .logo { font-family: var(--font-display); font-size: 24px; color: var(--ink); text-decoration: none; }
        .logo em { font-style: italic; color: var(--green); }
        
        .hero { background: var(--surface); border-bottom: 2px solid var(--paper3); padding: 3rem 1.5rem; text-align: center; }
        .search-panel { max-width: 800px; margin: 0 auto; background: var(--surface); padding: 2rem; border-radius: var(--r-xl); box-shadow: var(--shadow-lg); border: 1px solid var(--paper3); }
        
        .search-wrap { display: flex; gap: 10px; margin-bottom: 1.5rem; }
        .search-input { flex: 1; height: 56px; padding: 0 20px; border: 2px solid var(--paper3); border-radius: var(--r-lg); font-size: 16px; }
        .search-input:focus { outline: none; border-color: var(--green); }
        .search-btn { height: 56px; padding: 0 30px; border-radius: var(--r-lg); border: none; background: var(--green); color: #fff; font-weight: 600; cursor: pointer; }

        .drop-zone { border: 2px dashed var(--paper3); border-radius: var(--r-xl); padding: 2.5rem; text-align: center; cursor: pointer; background: var(--paper); transition: 0.2s; }
        .drop-zone.active { border-color: var(--green); background: var(--green-light); }
        
        .ai-status { display: none; padding: 2rem; text-align: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--paper3); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal-box { background: #fff; padding: 2rem; border-radius: 20px; max-width: 450px; width: 100%; }
        
        .job-card { background: var(--surface); border: 1px solid var(--paper3); border-radius: var(--r-lg); padding: 1.5rem; margin-bottom: 1rem; text-align: left; }
        .apply-btn { background: var(--green); color: #fff; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: 600; display: inline-block; margin-top: 10px; }
    </style>
</head>
<body>

<header class="header">
    <div class="header-inner">
        <a class="logo" href="#">Kazi <em>TZ</em></a>
        <div style="flex:1"></div>
        <button onclick="openTokenModal()" style="background:none; border:1px solid var(--paper3); padding:5px 12px; border-radius:6px; cursor:pointer; font-size:12px;">Settings</button>
    </div>
</header>

<section class="hero">
    <div class="search-panel">
        <h1 style="margin-bottom:1rem; font-family:var(--font-display);">Professional <em>Job Intelligence</em></h1>
        
        <div class="search-wrap">
            <input class="search-input" id="mainSearch" type="text" placeholder="Search by role, skill, or location..."/>
            <button class="search-btn" onclick="triggerSearch()">Find Vacancies</button>
        </div>

        <div class="drop-zone" id="dropZone" onclick="document.getElementById('cvInput').click()">
            <p style="font-size:18px; font-weight:600;">Match My Document</p>
            <p style="font-size:14px; color:var(--ink3);">Upload PDF or CV to find matching opportunities</p>
            <input type="file" id="cvInput" accept=".pdf,.doc,.docx,.txt" style="display:none;" onchange="handleFileUpload(this.files[0])"/>
        </div>
    </div>
</section>

<div class="ai-status" id="aiStatus">
    <div class="spinner"></div>
    <div id="statusMsg" style="font-weight:600;">Connecting to live database...</div>
</div>

<div id="jobsList" style="max-width:800px; margin: 2rem auto; padding: 0 1.5rem;"></div>

<div class="modal-bg" id="tokenModal">
    <div class="modal-box">
        <h2 style="margin-bottom:10px;">System Configuration</h2>
        <p style="margin-bottom:20px; color:var(--ink3); font-size:14px;">Enter your Access Token to enable live job board scanning.</p>
        <input type="password" id="tokenInput" class="search-input" style="width:100%; margin-bottom:15px;" placeholder="Paste token here..."/>
        <button onclick="saveToken()" class="search-btn" style="width:100%;">Connect System</button>
    </div>
</div>

<script>
    const TOKEN_KEY = 'kazi_tz_access_token';
    
    function getToken() { return localStorage.getItem(TOKEN_KEY); }
    function openTokenModal() { document.getElementById('tokenModal').style.display = 'flex'; }
    
    function saveToken() {
        const val = document.getElementById('tokenInput').value;
        if(val) {
            localStorage.setItem(TOKEN_KEY, val);
            document.getElementById('tokenModal').style.display = 'none';
            alert("System Connected.");
        }
    }

    async function handleFileUpload(file) {
        if (!file || !getToken()) { if(!getToken()) openTokenModal(); return; }
        
        document.getElementById('aiStatus').style.display = 'block';
        document.getElementById('statusMsg').textContent = "Reading document intelligence...";

        const reader = new FileReader();
        reader.onload = async () => {
            const base64Content = reader.result.split(',')[1];
            await runSmartQuery(null, base64Content, file.type);
        };
        reader.readAsDataURL(file);
    }

    async function triggerSearch() {
        const q = document.getElementById('mainSearch').value;
        if(!q) return;
        if(!getToken()) { openTokenModal(); return; }
        await runSmartQuery(q);
    }

    async function runSmartQuery(query, fileBase64 = null, mimeType = null) {
        document.getElementById('aiStatus').style.display = 'block';
        const list = document.getElementById('jobsList');
        list.innerHTML = '';

        const payload = {
            contents: [{
                parts: [
                    { text: fileBase64 ? "Analyze this CV/Document and find 10 matching open jobs in Tanzania. Return as a clean JSON array." : `Find 10 real open jobs in Tanzania for: ${query}. Return as a JSON array.` },
                    fileBase64 ? { inline_data: { mime_type: mimeType, data: fileBase64 } } : null
                ].filter(Boolean)
            }],
            tools: [{ googleSearch: {} }],
            generationConfig: { response_mime_type: "application/json" }
        };

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${getToken()}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.status === 429) {
                document.getElementById('statusMsg').textContent = "System busy. Retrying in 5 seconds...";
                setTimeout(() => runSmartQuery(query, fileBase64, mimeType), 5000);
                return;
            }

            const data = await response.json();
            const jobs = JSON.parse(data.candidates[0].content.parts[0].text);
            
            list.innerHTML = jobs.map(j => `
                <div class="job-card">
                    <h3>${j.title || j.job_title}</h3>
                    <p><strong>${j.company || j.organization}</strong> — ${j.location || 'Tanzania'}</p>
                    <p style="font-size:14px; margin:10px 0; color:var(--ink2);">${j.summary || j.description}</p>
                    <a href="${j.url || j.link}" target="_blank" class="apply-btn">Direct Apply →</a>
                </div>
            `).join('');
        } catch (e) {
            console.error(e);
            alert("Connection error. Ensure your token is valid.");
        } finally {
            document.getElementById('aiStatus').style.display = 'none';
        }
    }

    window.onload = () => { if(!getToken()) openTokenModal(); };
</script>
</body>
</html>
