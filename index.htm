<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kazi TZ | The Smart Career Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #059669; --bg: #F8FAFC; --text: #0F172A; --radius: 20px; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 50px; }

        .nav { background: #fff; padding: 1.2rem; border-bottom: 1px solid #E2E8F0; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; font-size: 1.4rem; color: var(--primary); text-decoration: none; }
        .logo span { color: #000; }

        .container { max-width: 600px; margin: 2rem auto; padding: 0 1rem; }

        /* The Main Action Hub */
        .hub { background: #fff; padding: 2rem; border-radius: var(--radius); border: 1px solid #E2E8F0; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05); text-align: center; }
        .upload-zone { border: 2.5px dashed #CBD5E1; padding: 3rem 1rem; border-radius: 18px; cursor: pointer; transition: 0.3s; background: #F9FAFB; margin-bottom: 1.5rem; }
        .upload-zone:hover { border-color: var(--primary); background: #F0FDF4; }
        .upload-zone h3 { margin-bottom: 8px; color: var(--primary); }

        /* Results & Guidance */
        #results-area { margin-top: 2rem; }
        .job-card { background: #fff; padding: 1.5rem; border-radius: 18px; border: 1px solid #E2E8F0; margin-bottom: 1rem; position: relative; }
        .match-score { position: absolute; top: 1.5rem; right: 1.5rem; font-weight: 800; font-size: 0.8rem; background: #DCFCE7; color: #166534; padding: 4px 10px; border-radius: 20px; }
        .job-title { font-weight: 800; font-size: 1.1rem; margin-bottom: 4px; padding-right: 60px; }
        .job-meta { font-size: 0.85rem; color: #64748B; font-weight: 600; margin-bottom: 15px; }

        /* THE ADVICE BOX (Key for your requirement) */
        .advice-box { background: #FFF7ED; border: 1px solid #FFEDD5; padding: 1rem; border-radius: 12px; margin-top: 15px; }
        .advice-box h4 { font-size: 0.8rem; text-transform: uppercase; color: #9A3412; margin-bottom: 8px; letter-spacing: 0.5px; }
        .advice-list { font-size: 0.85rem; color: #7C2D12; padding-left: 1.2rem; }
        .advice-list li { margin-bottom: 4px; font-weight: 500; }

        .btn-apply { display: inline-block; width: 100%; text-align: center; background: var(--primary); color: #fff; text-decoration: none; padding: 12px; border-radius: 12px; font-weight: 700; margin-top: 15px; transition: 0.2s; }
        .btn-apply:hover { background: #047857; }

        #loading { display: none; text-align: center; padding: 2rem; }
        .loader { width: 40px; height: 40px; border: 4px solid #F1F5F9; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<nav class="nav">
    <a href="#" class="logo">Kazi<span>TZ</span></a>
    <div style="font-size: 0.7rem; font-weight: 800; color: #64748B;">AI-GUIDED PORTAL</div>
</nav>

<div class="container">
    <div class="hub">
        <h3>Smart CV Matcher</h3>
        <p style="color: #64748B; font-size: 0.9rem; margin-bottom: 1.5rem;">Upload your CV. Get matched. Get improvement advice.</p>
        
        <div class="upload-zone" onclick="document.getElementById('cvInput').click()">
            <h3>📄 Click to Upload CV</h3>
            <p style="font-size: 0.8rem; color: #94A3B8;">PDF, Word, or Text files</p>
            <input type="file" id="cvInput" hidden accept=".pdf,.doc,.docx,.txt" onchange="processCV(this.files[0])">
        </div>
    </div>

    <div id="loading">
        <div class="loader"></div>
        <p style="margin-top: 10px; font-weight: 700; color: #64748B;">AI is analyzing CV gaps & live vacancies...</p>
    </div>

    <div id="results-area"></div>
</div>

<script>
    const KEY = 'AIzaSyD-aFM-A8m6lw7eNSvHOheES-p0WhzrQ38';

    async function processCV(file) {
        if(!file) return;
        document.getElementById('loading').style.display = 'block';
        document.getElementById('results-area').innerHTML = '';

        const reader = new FileReader();
        reader.onload = async () => {
            const b64 = reader.result.split(',')[1];
            // The prompt now explicitly asks for recommendations AND improvement advice
            const prompt = `Analyze this CV against active job vacancies in Tanzania. 
                1. Find 5 high-matching jobs. 
                2. For EACH job, provide "CV Improvement Advice" on how the user can edit their CV to match this specific role better.
                Return ONLY a JSON array of objects: [{title, company, location, score, url, improvements: []}]`;

            await runAI(prompt, b64, file.type);
        };
        reader.readAsDataURL(file);
    }

    async function runAI(prompt, data, mime) {
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: mime, data: data } }] }],
                    tools: [{ googleSearch: {} }],
                    generationConfig: { response_mime_type: "application/json" }
                })
            });

            const json = await res.json();
            const jobs = JSON.parse(json.candidates[0].content.parts[0].text);

            document.getElementById('results-area').innerHTML = jobs.map(j => `
                <div class="job-card">
                    <div class="match-score">${j.score} Match</div>
                    <div class="job-title">${j.title}</div>
                    <div class="job-meta">${j.company} • ${j.location}</div>
                    
                    <div class="advice-box">
                        <h4>💡 How to match better:</h4>
                        <ul class="advice-list">
                            ${j.improvements.map(imp => `<li>${imp}</li>`).join('')}
                        </ul>
                    </div>

                    <a href="${j.url}" target="_blank" class="btn-apply">View & Apply →</a>
                </div>
            `).join('');
        } catch (e) {
            document.getElementById('results-area').innerHTML = `
                <div style="text-align:center; padding:2rem; background:#FFF1F2; border-radius:18px; color:#9F1239;">
                    <strong>Wait a moment.</strong> The AI engine is refreshing. Please tap the upload zone again in 10 seconds.
                </div>`;
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }
</script>
</body>
</html>
