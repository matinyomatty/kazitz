<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kazi TZ | Professional AI Matcher</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #059669; --bg: #F8FAFC; --card: #FFFFFF; --text: #111827; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 40px; }

        .nav { background: #fff; padding: 1.2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #E5E7EB; position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: 800; font-size: 1.4rem; color: var(--primary); letter-spacing: -1px; text-decoration: none; }
        .logo span { color: #000; }

        .container { max-width: 500px; margin: 1.5rem auto; padding: 0 1rem; }
        
        /* The Matcher Hub */
        .hub { background: #fff; padding: 2rem; border-radius: 24px; border: 1px solid #E5E7EB; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); text-align: center; }
        .upload-area { border: 2px dashed #CBD5E1; padding: 2.5rem 1rem; border-radius: 16px; cursor: pointer; background: #F9FAFB; transition: 0.2s; margin-top: 1rem; }
        .upload-area:hover { border-color: var(--primary); background: #ECFDF5; }

        /* Real-Time Progress UI */
        #progress-box { display: none; margin-top: 1.5rem; text-align: left; background: #EEF2FF; padding: 1.2rem; border-radius: 16px; border: 1px solid #E0E7FF; }
        .step { font-size: 0.85rem; color: #4338CA; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; font-weight: 600; }
        .step.done { color: #059669; opacity: 0.7; }
        .dot { width: 8px; height: 8px; background: #4338CA; border-radius: 50%; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(0.8); opacity: 0.5; } }

        /* Job & Advice Cards */
        .job-card { background: #fff; border-radius: 20px; padding: 1.5rem; margin-top: 1.2rem; border: 1px solid #E5E7EB; position: relative; }
        .score { position: absolute; top: 1.2rem; right: 1.2rem; background: #DCFCE7; color: #166534; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 800; }
        .job-title { font-weight: 800; font-size: 1.1rem; margin-bottom: 5px; width: 80%; }
        .company { font-weight: 600; color: var(--primary); font-size: 0.9rem; margin-bottom: 12px; }
        
        .advice { background: #FFF7ED; border: 1px solid #FFEDD5; padding: 1rem; border-radius: 12px; margin-top: 10px; }
        .advice h4 { font-size: 0.75rem; text-transform: uppercase; color: #9A3412; letter-spacing: 0.5px; margin-bottom: 6px; }
        .advice p { font-size: 0.85rem; color: #7C2D12; line-height: 1.4; font-weight: 500; }

        .btn-link { display: block; text-align: center; background: var(--primary); color: #fff; text-decoration: none; padding: 12px; border-radius: 12px; font-weight: 700; margin-top: 12px; font-size: 0.9rem; }
    </style>
</head>
<body>

<nav class="nav">
    <a href="#" class="logo">Kazi<span>TZ</span></a>
    <div style="font-size: 0.65rem; font-weight: 800; background: #000; color: #fff; padding: 4px 10px; border-radius: 20px;">AI AUDIT ACTIVE</div>
</nav>

<div class="container">
    <div class="hub">
        <h2 style="font-size: 1.3rem;">Guided CV Matcher</h2>
        <p style="font-size: 0.85rem; color: #6B7280; margin-top: 5px;">We don't just find jobs—we tell you how to land them.</p>
        
        <div class="upload-area" onclick="document.getElementById('fileIn').click()">
            <span style="font-size: 2rem;">📄</span>
            <p style="font-weight: 700; margin-top: 10px;">Upload CV to Match</p>
            <p style="font-size: 0.75rem; color: #94A3B8;">Matches to live Tanzanian openings</p>
            <input type="file" id="fileIn" hidden accept=".pdf,.doc,.docx,.txt" onchange="handleMatch(this.files[0])">
        </div>

        <div id="progress-box">
            <div id="s1" class="step"><div class="dot"></div> Reading Professional Profile...</div>
            <div id="s2" class="step"><div class="dot"></div> Scanning Live Portals (UN, NGO, Private)...</div>
            <div id="s3" class="step"><div class="dot"></div> Generating CV Improvement Advice...</div>
        </div>
    </div>

    <div id="results"></div>
</div>

<script>
    const API_KEY = 'AIzaSyD-aFM-A8m6lw7eNSvHOheES-p0WhzrQ38';

    async function handleMatch(file) {
        if(!file) return;
        document.getElementById('progress-box').style.display = 'block';
        document.getElementById('results').innerHTML = '';
        updateStep('s1');

        const reader = new FileReader();
        reader.onload = async () => {
            const b64 = reader.result.split(',')[1];
            
            // Search track
            updateStep('s2');
            const prompt = `Perform a deep match for this CV against active Tanzania jobs (LinkedIn, NGO boards, ZoomTanzania). 
            For the top 5 matches:
            1. Provide a "Match Score".
            2. Provide 3 specific bullet points on how to improve this CV for that specific role.
            Return JSON: [{title, company, score, url, advice}]`;

            await callAI(prompt, b64, file.type);
        };
        reader.readAsDataURL(file);
    }

    function updateStep(id) {
        const steps = ['s1', 's2', 's3'];
        steps.forEach(s => {
            const el = document.getElementById(s);
            if(s === id) {
                el.classList.remove('done');
                el.style.display = 'flex';
            } else if (steps.indexOf(s) < steps.indexOf(id)) {
                el.classList.add('done');
                el.innerHTML = '✓ ' + el.innerText.replace('✓ ', '');
            }
        });
    }

    async function callAI(prompt, data, mime) {
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: mime, data: data } }] }],
                    tools: [{ googleSearch: {} }],
                    generationConfig: { response_mime_type: "application/json", temperature: 0.2 }
                })
            });

            updateStep('s3');
            const json = await res.json();
            const jobs = JSON.parse(json.candidates[0].content.parts[0].text);

            document.getElementById('results').innerHTML = jobs.map(j => `
                <div class="job-card">
                    <div class="score">${j.score} Match</div>
                    <div class="job-title">${j.title}</div>
                    <div class="company">${j.company}</div>
                    
                    <div class="advice">
                        <h4>💡 Land this job:</h4>
                        <p>${j.advice}</p>
                    </div>

                    <a href="${j.url}" target="_blank" class="btn-link">View Vacancy & Apply →</a>
                </div>
            `).join('');

        } catch (e) {
            document.getElementById('results').innerHTML = `
                <div style="padding:1.5rem; background:#FFF1F2; border-radius:16px; color:#9F1239; font-size:0.9rem; text-align:center;">
                    <strong>Search Limit Reached.</strong><br>The AI is still processing your file. Please wait 15 seconds and tap "Retry" to see your results.
                </div>`;
        } finally {
            document.getElementById('progress-box').style.display = 'none';
        }
    }
</script>
</body>
</html>
